<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#010409"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#58a6ff" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#58a6ff" stop-opacity="0"/>
    </radialGradient>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="textglow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="nodeglow">
      <feGaussianBlur stdDeviation="4"/>
    </filter>
    <filter id="signalglow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="600" fill="url(#bg)"/>
  <ellipse cx="400" cy="300" rx="350" ry="280" fill="url(#glow)"/>

  <!-- Constellation lines (knowledge connections) -->
  <g stroke="#58a6ff" stroke-width="1">
    <!-- Outer ring connections -->
    <line x1="145" y1="155" x2="290" y2="95" stroke-opacity="0.12">
      <animate attributeName="stroke-opacity" values="0.12;0.25;0.12" dur="7s" begin="1s" repeatCount="indefinite"/>
    </line>
    <line x1="290" y1="95" x2="510" y2="85" stroke-opacity="0.12"/>
    <line x1="510" y1="85" x2="660" y2="150" stroke-opacity="0.12">
      <animate attributeName="stroke-opacity" values="0.12;0.28;0.12" dur="6s" begin="3s" repeatCount="indefinite"/>
    </line>
    <line x1="660" y1="150" x2="700" y2="310" stroke-opacity="0.12"/>
    <line x1="700" y1="310" x2="640" y2="460" stroke-opacity="0.12">
      <animate attributeName="stroke-opacity" values="0.12;0.22;0.12" dur="9s" begin="5s" repeatCount="indefinite"/>
    </line>
    <line x1="640" y1="460" x2="490" y2="520" stroke-opacity="0.12"/>
    <line x1="490" y1="520" x2="310" y2="510" stroke-opacity="0.12">
      <animate attributeName="stroke-opacity" values="0.12;0.25;0.12" dur="8s" begin="2s" repeatCount="indefinite"/>
    </line>
    <line x1="310" y1="510" x2="155" y2="440" stroke-opacity="0.12"/>
    <line x1="155" y1="440" x2="105" y2="300" stroke-opacity="0.12"/>
    <line x1="105" y1="300" x2="145" y2="155" stroke-opacity="0.12">
      <animate attributeName="stroke-opacity" values="0.12;0.2;0.12" dur="11s" begin="4s" repeatCount="indefinite"/>
    </line>

    <!-- Mid connections -->
    <line x1="220" y1="200" x2="370" y2="160" stroke-opacity="0.12"/>
    <line x1="370" y1="160" x2="540" y2="175" stroke-opacity="0.12">
      <animate attributeName="stroke-opacity" values="0.12;0.3;0.12" dur="5s" begin="0.5s" repeatCount="indefinite"/>
    </line>
    <line x1="540" y1="175" x2="610" y2="280" stroke-opacity="0.12"/>
    <line x1="610" y1="280" x2="560" y2="410" stroke-opacity="0.12">
      <animate attributeName="stroke-opacity" values="0.12;0.22;0.12" dur="7s" begin="6s" repeatCount="indefinite"/>
    </line>
    <line x1="560" y1="410" x2="400" y2="460" stroke-opacity="0.12"/>
    <line x1="400" y1="460" x2="250" y2="400" stroke-opacity="0.12"/>
    <line x1="250" y1="400" x2="195" y2="290" stroke-opacity="0.12">
      <animate attributeName="stroke-opacity" values="0.12;0.25;0.12" dur="8s" begin="3.5s" repeatCount="indefinite"/>
    </line>
    <line x1="195" y1="290" x2="220" y2="200" stroke-opacity="0.12"/>

    <!-- Radial connections to center -->
    <line x1="400" y1="280" x2="145" y2="155" stroke-opacity="0.12"/>
    <line x1="400" y1="280" x2="290" y2="95" stroke-opacity="0.12">
      <animate attributeName="stroke-opacity" values="0.12;0.3;0.12" dur="6s" begin="1.5s" repeatCount="indefinite"/>
    </line>
    <line x1="400" y1="280" x2="510" y2="85" stroke-opacity="0.12"/>
    <line x1="400" y1="280" x2="660" y2="150" stroke-opacity="0.12">
      <animate attributeName="stroke-opacity" values="0.12;0.25;0.12" dur="7s" begin="4.5s" repeatCount="indefinite"/>
    </line>
    <line x1="400" y1="280" x2="700" y2="310" stroke-opacity="0.12"/>
    <line x1="400" y1="280" x2="640" y2="460" stroke-opacity="0.12"/>
    <line x1="400" y1="280" x2="490" y2="520" stroke-opacity="0.12">
      <animate attributeName="stroke-opacity" values="0.12;0.2;0.12" dur="9s" begin="7s" repeatCount="indefinite"/>
    </line>
    <line x1="400" y1="280" x2="310" y2="510" stroke-opacity="0.12"/>
    <line x1="400" y1="280" x2="155" y2="440" stroke-opacity="0.12"/>
    <line x1="400" y1="280" x2="105" y2="300" stroke-opacity="0.12">
      <animate attributeName="stroke-opacity" values="0.12;0.28;0.12" dur="6s" begin="2.5s" repeatCount="indefinite"/>
    </line>

    <!-- Cross connections -->
    <line x1="220" y1="200" x2="540" y2="175" stroke-opacity="0.12"/>
    <line x1="370" y1="160" x2="610" y2="280" stroke-opacity="0.12">
      <animate attributeName="stroke-opacity" values="0.12;0.22;0.12" dur="10s" begin="5.5s" repeatCount="indefinite"/>
    </line>
    <line x1="250" y1="400" x2="560" y2="410" stroke-opacity="0.12"/>
    <line x1="195" y1="290" x2="610" y2="280" stroke-opacity="0.12"/>
    <line x1="290" y1="95" x2="640" y2="460" stroke-opacity="0.12">
      <animate attributeName="stroke-opacity" values="0.12;0.18;0.12" dur="12s" begin="8s" repeatCount="indefinite"/>
    </line>
    <line x1="145" y1="155" x2="490" y2="520" stroke-opacity="0.12"/>
    <line x1="660" y1="150" x2="310" y2="510" stroke-opacity="0.12"/>
  </g>

  <!-- Neural signal pulses traveling along connections -->
  <g filter="url(#signalglow)">
    <!-- Signal: center → top-right outer -->
    <circle r="2.5" fill="#58a6ff" opacity="0">
      <animateMotion dur="3.5s" repeatCount="indefinite" begin="0s"
        path="M400,280 L510,85"/>
      <animate attributeName="opacity" values="0;0;0.9;0.9;0" dur="3.5s" keyTimes="0;0.05;0.15;0.85;1" repeatCount="indefinite" begin="0s"/>
    </circle>

    <!-- Signal: right outer → center (incoming) -->
    <circle r="2" fill="#79c0ff" opacity="0">
      <animateMotion dur="4s" repeatCount="indefinite" begin="2s"
        path="M700,310 L400,280"/>
      <animate attributeName="opacity" values="0;0;0.8;0.8;0" dur="4s" keyTimes="0;0.05;0.15;0.85;1" repeatCount="indefinite" begin="2s"/>
    </circle>

    <!-- Signal: center → bottom-left outer -->
    <circle r="2" fill="#58a6ff" opacity="0">
      <animateMotion dur="4.5s" repeatCount="indefinite" begin="1s"
        path="M400,280 L155,440"/>
      <animate attributeName="opacity" values="0;0;0.85;0.85;0" dur="4.5s" keyTimes="0;0.05;0.15;0.85;1" repeatCount="indefinite" begin="1s"/>
    </circle>

    <!-- Signal: mid ring traverse left→right -->
    <circle r="2" fill="#79c0ff" opacity="0">
      <animateMotion dur="6s" repeatCount="indefinite" begin="0.5s"
        path="M220,200 L370,160 L540,175 L610,280"/>
      <animate attributeName="opacity" values="0;0;0.7;0.7;0" dur="6s" keyTimes="0;0.03;0.1;0.9;1" repeatCount="indefinite" begin="0.5s"/>
    </circle>

    <!-- Signal: center → left outer -->
    <circle r="2.5" fill="#58a6ff" opacity="0">
      <animateMotion dur="3s" repeatCount="indefinite" begin="4s"
        path="M400,280 L105,300"/>
      <animate attributeName="opacity" values="0;0;0.9;0.9;0" dur="3s" keyTimes="0;0.05;0.15;0.85;1" repeatCount="indefinite" begin="4s"/>
    </circle>

    <!-- Signal: cross diagonal top-left → bottom-right -->
    <circle r="1.8" fill="#58a6ff" opacity="0">
      <animateMotion dur="7s" repeatCount="indefinite" begin="3s"
        path="M290,95 L640,460"/>
      <animate attributeName="opacity" values="0;0;0.6;0.6;0" dur="7s" keyTimes="0;0.03;0.1;0.9;1" repeatCount="indefinite" begin="3s"/>
    </circle>

    <!-- Signal: bottom mid → center (incoming) -->
    <circle r="2" fill="#79c0ff" opacity="0">
      <animateMotion dur="3.5s" repeatCount="indefinite" begin="5.5s"
        path="M400,460 L400,280"/>
      <animate attributeName="opacity" values="0;0;0.85;0.85;0" dur="3.5s" keyTimes="0;0.05;0.15;0.85;1" repeatCount="indefinite" begin="5.5s"/>
    </circle>

    <!-- Signal: center → top-left outer -->
    <circle r="2" fill="#58a6ff" opacity="0">
      <animateMotion dur="4s" repeatCount="indefinite" begin="7s"
        path="M400,280 L145,155"/>
      <animate attributeName="opacity" values="0;0;0.8;0.8;0" dur="4s" keyTimes="0;0.05;0.15;0.85;1" repeatCount="indefinite" begin="7s"/>
    </circle>

    <!-- Signal: mid ring traverse right→bottom -->
    <circle r="1.8" fill="#79c0ff" opacity="0">
      <animateMotion dur="5s" repeatCount="indefinite" begin="6s"
        path="M610,280 L560,410 L400,460 L250,400"/>
      <animate attributeName="opacity" values="0;0;0.7;0.7;0" dur="5s" keyTimes="0;0.03;0.1;0.9;1" repeatCount="indefinite" begin="6s"/>
    </circle>

    <!-- Signal: center → bottom-right outer -->
    <circle r="2.5" fill="#58a6ff" opacity="0">
      <animateMotion dur="4s" repeatCount="indefinite" begin="8.5s"
        path="M400,280 L640,460"/>
      <animate attributeName="opacity" values="0;0;0.9;0.9;0" dur="4s" keyTimes="0;0.05;0.15;0.85;1" repeatCount="indefinite" begin="8.5s"/>
    </circle>
  </g>

  <!-- Animated pulse rings -->
  <circle cx="400" cy="280" r="60" fill="none" stroke="#58a6ff" stroke-opacity="0.06" stroke-width="1">
    <animate attributeName="r" values="60;180;60" dur="8s" repeatCount="indefinite"/>
    <animate attributeName="stroke-opacity" values="0.06;0;0.06" dur="8s" repeatCount="indefinite"/>
  </circle>
  <circle cx="400" cy="280" r="120" fill="none" stroke="#58a6ff" stroke-opacity="0.04" stroke-width="1">
    <animate attributeName="r" values="120;260;120" dur="10s" repeatCount="indefinite"/>
    <animate attributeName="stroke-opacity" values="0.04;0;0.04" dur="10s" repeatCount="indefinite"/>
  </circle>

  <!-- Constellation nodes - outer ring (with breathing + micro-drift) -->
  <g filter="url(#nodeglow)">
    <circle cx="145" cy="155" r="3" fill="#58a6ff" opacity="0.5">
      <animate attributeName="opacity" values="0.5;0.3;0.5" dur="6s" begin="0s" repeatCount="indefinite"/>
      <animateTransform attributeName="transform" type="translate" values="0,0;1.5,-1;-0.5,1.5;0,0" dur="12s" repeatCount="indefinite"/>
    </circle>
    <circle cx="290" cy="95" r="4" fill="#58a6ff" opacity="0.6">
      <animate attributeName="opacity" values="0.6;0.35;0.6" dur="5s" begin="1.2s" repeatCount="indefinite"/>
      <animateTransform attributeName="transform" type="translate" values="0,0;-1,1.5;1,-0.5;0,0" dur="10s" repeatCount="indefinite"/>
    </circle>
    <circle cx="510" cy="85" r="3" fill="#58a6ff" opacity="0.45">
      <animate attributeName="opacity" values="0.45;0.25;0.45" dur="7s" begin="0.5s" repeatCount="indefinite"/>
      <animateTransform attributeName="transform" type="translate" values="0,0;1,1;-1.5,-0.5;0,0" dur="14s" repeatCount="indefinite"/>
    </circle>
    <circle cx="660" cy="150" r="4" fill="#58a6ff" opacity="0.55">
      <animate attributeName="opacity" values="0.55;0.3;0.55" dur="6s" begin="2.5s" repeatCount="indefinite"/>
      <animateTransform attributeName="transform" type="translate" values="0,0;-1.5,1;0.5,-1.5;0,0" dur="11s" repeatCount="indefinite"/>
    </circle>
    <circle cx="700" cy="310" r="3" fill="#58a6ff" opacity="0.4">
      <animate attributeName="opacity" values="0.4;0.2;0.4" dur="8s" begin="3s" repeatCount="indefinite"/>
      <animateTransform attributeName="transform" type="translate" values="0,0;-1,-1;1,1.5;0,0" dur="13s" repeatCount="indefinite"/>
    </circle>
    <circle cx="640" cy="460" r="4" fill="#58a6ff" opacity="0.5">
      <animate attributeName="opacity" values="0.5;0.3;0.5" dur="5.5s" begin="1.8s" repeatCount="indefinite"/>
      <animateTransform attributeName="transform" type="translate" values="0,0;1.5,1;-1,-1.5;0,0" dur="12s" repeatCount="indefinite"/>
    </circle>
    <circle cx="490" cy="520" r="3" fill="#58a6ff" opacity="0.45">
      <animate attributeName="opacity" values="0.45;0.25;0.45" dur="7s" begin="4s" repeatCount="indefinite"/>
      <animateTransform attributeName="transform" type="translate" values="0,0;-0.5,1.5;1,-1;0,0" dur="15s" repeatCount="indefinite"/>
    </circle>
    <circle cx="310" cy="510" r="4" fill="#58a6ff" opacity="0.55">
      <animate attributeName="opacity" values="0.55;0.35;0.55" dur="6s" begin="0.8s" repeatCount="indefinite"/>
      <animateTransform attributeName="transform" type="translate" values="0,0;1,-1.5;-1.5,0.5;0,0" dur="11s" repeatCount="indefinite"/>
    </circle>
    <circle cx="155" cy="440" r="3" fill="#58a6ff" opacity="0.5">
      <animate attributeName="opacity" values="0.5;0.25;0.5" dur="7.5s" begin="2s" repeatCount="indefinite"/>
      <animateTransform attributeName="transform" type="translate" values="0,0;1.5,0.5;-1,1;0,0" dur="13s" repeatCount="indefinite"/>
    </circle>
    <circle cx="105" cy="300" r="4" fill="#58a6ff" opacity="0.6">
      <animate attributeName="opacity" values="0.6;0.35;0.6" dur="5s" begin="3.5s" repeatCount="indefinite"/>
      <animateTransform attributeName="transform" type="translate" values="0,0;1,-1;-0.5,1.5;0,0" dur="10s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Constellation nodes - mid ring (with breathing + micro-drift) -->
  <g filter="url(#nodeglow)">
    <circle cx="220" cy="200" r="4" fill="#79c0ff" opacity="0.6">
      <animate attributeName="opacity" values="0.6;0.35;0.6" dur="5s" begin="0.3s" repeatCount="indefinite"/>
      <animateTransform attributeName="transform" type="translate" values="0,0;-1,1;1.5,-1.5;0,0" dur="9s" repeatCount="indefinite"/>
    </circle>
    <circle cx="370" cy="160" r="5" fill="#79c0ff" opacity="0.7">
      <animate attributeName="opacity" values="0.7;0.45;0.7" dur="4.5s" begin="1.5s" repeatCount="indefinite"/>
      <animateTransform attributeName="transform" type="translate" values="0,0;1,1.5;-1.5,-0.5;0,0" dur="8s" repeatCount="indefinite"/>
    </circle>
    <circle cx="540" cy="175" r="4" fill="#79c0ff" opacity="0.6">
      <animate attributeName="opacity" values="0.6;0.35;0.6" dur="6s" begin="2.2s" repeatCount="indefinite"/>
      <animateTransform attributeName="transform" type="translate" values="0,0;-1.5,-1;0.5,1.5;0,0" dur="11s" repeatCount="indefinite"/>
    </circle>
    <circle cx="610" cy="280" r="5" fill="#79c0ff" opacity="0.65">
      <animate attributeName="opacity" values="0.65;0.4;0.65" dur="5.5s" begin="0.7s" repeatCount="indefinite"/>
      <animateTransform attributeName="transform" type="translate" values="0,0;1,-1.5;-1,1;0,0" dur="10s" repeatCount="indefinite"/>
    </circle>
    <circle cx="560" cy="410" r="4" fill="#79c0ff" opacity="0.6">
      <animate attributeName="opacity" values="0.6;0.3;0.6" dur="6.5s" begin="3.3s" repeatCount="indefinite"/>
      <animateTransform attributeName="transform" type="translate" values="0,0;1.5,1;-1,-1.5;0,0" dur="12s" repeatCount="indefinite"/>
    </circle>
    <circle cx="400" cy="460" r="5" fill="#79c0ff" opacity="0.7">
      <animate attributeName="opacity" values="0.7;0.4;0.7" dur="5s" begin="4.5s" repeatCount="indefinite"/>
      <animateTransform attributeName="transform" type="translate" values="0,0;-1,1.5;1,-1;0,0" dur="9s" repeatCount="indefinite"/>
    </circle>
    <circle cx="250" cy="400" r="4" fill="#79c0ff" opacity="0.6">
      <animate attributeName="opacity" values="0.6;0.35;0.6" dur="5.5s" begin="1s" repeatCount="indefinite"/>
      <animateTransform attributeName="transform" type="translate" values="0,0;1.5,-0.5;-1,1.5;0,0" dur="10s" repeatCount="indefinite"/>
    </circle>
    <circle cx="195" cy="290" r="5" fill="#79c0ff" opacity="0.65">
      <animate attributeName="opacity" values="0.65;0.4;0.65" dur="6s" begin="2.8s" repeatCount="indefinite"/>
      <animateTransform attributeName="transform" type="translate" values="0,0;-1,-1;1.5,0.5;0,0" dur="11s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Tiny scattered stars (with twinkling) -->
  <g fill="#c9d1d9">
    <circle cx="70" cy="80" r="1" opacity="0.15">
      <animate attributeName="opacity" values="0.15;0.35;0.15" dur="4s" begin="0s" repeatCount="indefinite"/>
    </circle>
    <circle cx="730" cy="60" r="1" opacity="0.15">
      <animate attributeName="opacity" values="0.15;0.4;0.15" dur="3s" begin="1.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="750" cy="540" r="1.2" opacity="0.15">
      <animate attributeName="opacity" values="0.15;0.3;0.15" dur="5s" begin="0.8s" repeatCount="indefinite"/>
    </circle>
    <circle cx="50" cy="520" r="1" opacity="0.15">
      <animate attributeName="opacity" values="0.15;0.35;0.15" dur="3.5s" begin="2.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="180" cy="50" r="0.8" opacity="0.15">
      <animate attributeName="opacity" values="0.15;0.45;0.15" dur="6s" begin="3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="620" cy="40" r="1" opacity="0.15">
      <animate attributeName="opacity" values="0.15;0.3;0.15" dur="4.5s" begin="1s" repeatCount="indefinite"/>
    </circle>
    <circle cx="760" cy="200" r="0.8" opacity="0.15">
      <animate attributeName="opacity" values="0.15;0.4;0.15" dur="3s" begin="4s" repeatCount="indefinite"/>
    </circle>
    <circle cx="40" cy="400" r="1" opacity="0.15">
      <animate attributeName="opacity" values="0.15;0.35;0.15" dur="5.5s" begin="0.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="350" cy="30" r="0.8" opacity="0.15">
      <animate attributeName="opacity" values="0.15;0.3;0.15" dur="4s" begin="2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="680" cy="550" r="1" opacity="0.15">
      <animate attributeName="opacity" values="0.15;0.45;0.15" dur="7s" begin="3.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="120" cy="560" r="0.8" opacity="0.15">
      <animate attributeName="opacity" values="0.15;0.3;0.15" dur="4s" begin="5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="550" cy="560" r="1" opacity="0.15">
      <animate attributeName="opacity" values="0.15;0.35;0.15" dur="3.5s" begin="1.2s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Central kanji 心 (shin/kokoro - mind/heart) -->
  <text x="400" y="300" text-anchor="middle" dominant-baseline="central"
        font-family="serif" font-size="120" fill="#e6edf3" filter="url(#textglow)"
        opacity="0.9">心</text>

  <!-- Subtitle -->
  <text x="400" y="370" text-anchor="middle"
        font-family="'SF Mono', 'Fira Code', 'JetBrains Mono', monospace" font-size="14"
        fill="#8b949e" letter-spacing="6" opacity="0.7">S H I N</text>

  <!-- Decorative line under subtitle -->
  <line x1="355" y1="385" x2="445" y2="385" stroke="#58a6ff" stroke-opacity="0.3" stroke-width="1"/>

  <!-- Tagline -->
  <text x="400" y="410" text-anchor="middle"
        font-family="'SF Mono', 'Fira Code', 'JetBrains Mono', monospace" font-size="11"
        fill="#6e7681" letter-spacing="2" opacity="0.6">plan . decide . remember</text>

  <!-- Corner accent marks -->
  <g stroke="#58a6ff" stroke-opacity="0.15" stroke-width="1">
    <line x1="30" y1="30" x2="30" y2="60"/>
    <line x1="30" y1="30" x2="60" y2="30"/>
    <line x1="770" y1="30" x2="770" y2="60"/>
    <line x1="770" y1="30" x2="740" y2="30"/>
    <line x1="30" y1="570" x2="30" y2="540"/>
    <line x1="30" y1="570" x2="60" y2="570"/>
    <line x1="770" y1="570" x2="770" y2="540"/>
    <line x1="770" y1="570" x2="740" y2="570"/>
  </g>
</svg>
